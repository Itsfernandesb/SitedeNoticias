<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Diário Gaúcho</title>
     <link rel="stylesheet" href="../../css/main.css">
    <script src="../components/site-header.js" defer></script>
    <script src="../components/site-footer.js" defer></script>
    <script type = "module" src="../pages/login.js"></script>
</head>
<body>
    <site-header></site-header>
    <main class="principal-form">
        <form id="form-login" class="form">
            <h1>Entrar</h1>

            <label for="email">E-mail</label>
            <input type="email" nome="email" id="email" required>

            <label for="senha">Senha</label>
            <input type="password" nome="senha" id="senha" required>

            <p id="aviso"></p>

            <button type="submit" class="btn">Entrar</button>

            <p class="rodape-form">Não tem conta?
            <a href="../pages/cadastro.html">Cadastre-se</a></p>
        </form>
    </main>
     <site-footer></site-footer>
</body>
</html>
